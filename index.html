<div class="meta-grid">
    <div class="meta-item active">
        <span class="label">Fermentations-Stimmung</span>
        <select id="p_mood" class="value" style="background:none; color:#a3c9a3; border:none; font-family:inherit;">
            <option value="skeptisch">Skeptisch / Botanisch</option>
            <option value="melancholisch">Melancholisch / Welk</option>
            <option value="aggressiv">Aggressiv / Zersetzend</option>
            <option value="halluzinogen">Halluzinogen / Myzel-Rausch</option>
        </select>
    </div>
    
    <div class="meta-item active">
        <span class="label">Myzel-Dichte (Intensität)</span>
        <input type="range" id="p_intensity" min="0.1" max="1.0" step="0.1" value="0.7" style="width:100%;">
    </div>

    <div class="meta-item active">
        <span class="label">Zersetzungs-Grad (Länge)</span>
        <select id="p_length" class="value" style="background:none; color:#a3c9a3; border:none; font-family:inherit;">
            <option value="50">Kurzes Fragment</option>
            <option value="150" selected>Standard Extrakt</option>
            <option value="300">Wucherndes Geflecht</option>
        </select>
    </div>

    <div class="meta-item active">
        <span class="label">Enzym-Fokus</span>
        <select id="p_enzyme" class="value" style="background:none; color:#a3c9a3; border:none; font-family:inherit;">
            <option value="Phytochemie">Phytochemie</option>
            <option value="Mykologie">Mykologie</option>
            <option value="Rauschen">Digitales Rauschen</option>
        </select>
    </div>
</div>
