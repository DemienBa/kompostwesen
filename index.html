<body>
    <div class="reaktor-box">
        <div class="header">
            <span>Bio-Digitaler Reaktor // Phyto-Steuerung</span>
            <span id="sensor-status">Status: Bereit</span>
        </div>

        <div class="meta-grid">
            
            <div class="meta-item">
                <span class="label">Substrat-Quelle (Bücher)</span>
                <select id="p_source">
                    <option value="all">Alle Schichten</option>
                    <option value="kompost">Dreck & Kompost-Manifest</option> 
                    <option value="schlaflosigkeit">Schlaflosigkeit & Nacht</option>
                    <option value="myzel">Myzel & Geflecht</option>
                </select>
            </div>

            <div class="meta-item">
                <span class="label">KI-Sensitivität (Freiheit)</span>
                <input type="range" id="p_creativity" min="0.1" max="1.5" step="0.1" value="0.7">
            </div>

            <div class="meta-item">
                <span class="label">Fermentations-Stimmung</span>
                <select id="p_mood">
                    <option value="skeptisch">Skeptisch</option>
                    <option value="halluzinogen">Halluzinogen</option>
                    <option value="aggressiv">Aggressiv</option>
                </select>
            </div>

            <div class="meta-item">
                <span class="label">Zersetzungs-Grad (Länge)</span>
                <select id="p_length">
                    <option value="150" selected>Standard</option>
                    <option value="400">Wuchernd</option>
                </select>
            </div>

        </div> <div id="output">System bereit...</div>

        <div class="btn-group">
            <button onclick="ausgraben()">Extraktion starten</button>
            <button class="ki-btn" onclick="fermentieren()">KI-Fermentierung</button>
        </div>

    </div>
</body>
